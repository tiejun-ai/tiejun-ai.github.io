<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 330" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="740" height="330" fill="#ffffff"/>

  <!-- Stage 1 -->
  <rect x="30" y="40" width="200" height="180" rx="10" fill="#fdf0c9" stroke="#e0b84c" stroke-width="1.4"/>
  <text x="130" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#7a5a12">Stage 1</text>
  <text x="130" y="68" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7a5a12">Item Tokenization</text>
  <text x="130" y="88" text-anchor="middle" font-size="13" fill="#7a5a12">(SID-v2)</text>
  <line x1="50" y1="100" x2="210" y2="100" stroke="#e0b84c" stroke-width="1"/>
  <text x="50" y="120" font-size="12" fill="#6b4f10">• RQ-VAE over fused</text>
  <text x="50" y="136" font-size="12" fill="#6b4f10">&#160;&#160;multi-modal embeddings</text>
  <text x="50" y="156" font-size="12" fill="#6b4f10">• multi-resolution codebooks</text>
  <text x="50" y="176" font-size="12" fill="#6b4f10">• progressive masking</text>
  <text x="50" y="196" font-size="12" fill="#6b4f10">• co-occurrence contrastive</text>
  <text x="130" y="240" text-anchor="middle" font-size="12" font-style="italic" fill="#555">every video → a tuple of codewords</text>

  <line x1="232" y1="130" x2="264" y2="130" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Stage 2 -->
  <rect x="270" y="40" width="200" height="180" rx="10" fill="#cfe3f7" stroke="#6aa3d5" stroke-width="1.4"/>
  <text x="370" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1c3a5e">Stage 2</text>
  <text x="370" y="68" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1c3a5e">Continued Pre-training</text>
  <text x="370" y="88" text-anchor="middle" font-size="13" fill="#1c3a5e">(CPT)</text>
  <line x1="290" y1="100" x2="450" y2="100" stroke="#6aa3d5" stroke-width="1"/>
  <text x="290" y="120" font-size="12" fill="#1c3a5e">• add SID tokens to the</text>
  <text x="290" y="136" font-size="12" fill="#1c3a5e">&#160;&#160;LLM vocabulary</text>
  <text x="290" y="156" font-size="12" fill="#1c3a5e">• 50% user behavior data</text>
  <text x="290" y="176" font-size="12" fill="#1c3a5e">• 50% video metadata</text>
  <text x="290" y="196" font-size="12" fill="#1c3a5e">• ~260B tokens, 1M steps</text>
  <text x="370" y="240" text-anchor="middle" font-size="12" font-style="italic" fill="#555">SIDs grounded in language</text>

  <line x1="472" y1="130" x2="504" y2="130" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Stage 3 -->
  <rect x="510" y="40" width="200" height="180" rx="10" fill="#d9f0d9" stroke="#7fbf7f" stroke-width="1.4"/>
  <text x="610" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#2a6b2a">Stage 3</text>
  <text x="610" y="68" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2a6b2a">Task Fine-tuning</text>
  <text x="610" y="88" text-anchor="middle" font-size="13" fill="#2a6b2a">(generative retrieval SFT)</text>
  <line x1="530" y1="100" x2="690" y2="100" stroke="#7fbf7f" stroke-width="1"/>
  <text x="530" y="120" font-size="12" fill="#2a6b2a">• predict SID of next</text>
  <text x="530" y="136" font-size="12" fill="#2a6b2a">&#160;&#160;clicked video</text>
  <text x="530" y="156" font-size="12" fill="#2a6b2a">• reward-weighted loss</text>
  <text x="530" y="176" font-size="12" fill="#2a6b2a">• real-time context features</text>
  <text x="530" y="196" font-size="12" fill="#2a6b2a">• beam search at serving</text>
  <text x="610" y="232" text-anchor="middle" font-size="12" font-style="italic" fill="#555">generate video candidates</text>
  <text x="610" y="248" text-anchor="middle" font-size="12" font-style="italic" fill="#555">for recommendation</text>

  <!-- bottom note -->
  <rect x="30" y="272" width="680" height="28" rx="8" fill="#f4f4f4" stroke="#ccc" stroke-width="1"/>
  <text x="370" y="290" text-anchor="middle" font-size="12.5" fill="#444">Deployed at YouTube for both long-form video and YouTube Shorts.</text>
</svg>
