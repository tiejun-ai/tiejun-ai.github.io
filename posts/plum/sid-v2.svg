<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="470" fill="#ffffff"/>

  <!-- inputs -->
  <rect x="20" y="52" width="120" height="34" rx="8" fill="#fde3c4" stroke="#e0a15c" stroke-width="1.2"/>
  <text x="80" y="74" text-anchor="middle" font-size="12.5" fill="#8a4b12" font-weight="700">Embed 1 (text)</text>
  <rect x="20" y="112" width="120" height="34" rx="8" fill="#d9f0d9" stroke="#7fbf7f" stroke-width="1.2"/>
  <text x="80" y="134" text-anchor="middle" font-size="12.5" fill="#2a6b2a" font-weight="700">Embed 2 (visual)</text>
  <text x="80" y="34" text-anchor="middle" font-size="12" font-style="italic" fill="#666">multi-modal content</text>

  <line x1="142" y1="69" x2="172" y2="82" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="142" y1="129" x2="172" y2="116" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- encoders + fuse -->
  <rect x="176" y="70" width="110" height="58" rx="8" fill="#e6e6e6" stroke="#999" stroke-width="1.1"/>
  <text x="231" y="94" text-anchor="middle" font-size="12.5" fill="#333">DNN encoders</text>
  <text x="231" y="112" text-anchor="middle" font-size="12.5" fill="#333">concat &amp; project</text>
  <line x1="288" y1="99" x2="318" y2="99" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="320" y="82" width="60" height="34" rx="8" fill="#cfe3f7" stroke="#6aa3d5" stroke-width="1.2"/>
  <text x="350" y="105" text-anchor="middle" font-size="13.5" fill="#1c3a5e" font-weight="700" font-style="italic">z</text>

  <!-- residual quantizer -->
  <rect x="180" y="160" width="400" height="170" rx="10" fill="#fdf0c9" stroke="#e0b84c" stroke-width="1.4"/>
  <text x="380" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#7a5a12">Residual Quantization — multi-resolution codebooks</text>

  <!-- codebook bars, shrinking = lower resolution -->
  <g stroke="#e0b84c" stroke-width="1">
    <rect x="205" y="200" width="60" height="70" rx="4" fill="#f5d98a"/>
    <rect x="285" y="218" width="60" height="52" rx="4" fill="#f7e0a3"/>
    <rect x="365" y="232" width="60" height="38" rx="4" fill="#f9e7bb"/>
    <rect x="445" y="243" width="60" height="27" rx="4" fill="#fbeed2"/>
    <rect x="510" y="251" width="50" height="19" rx="4" fill="#fcf4e4"/>
  </g>
  <text x="235" y="288" text-anchor="middle" font-size="11.5" fill="#6b4f10">2048</text>
  <text x="315" y="288" text-anchor="middle" font-size="11.5" fill="#6b4f10">1024</text>
  <text x="395" y="288" text-anchor="middle" font-size="11.5" fill="#6b4f10">512</text>
  <text x="475" y="288" text-anchor="middle" font-size="11.5" fill="#6b4f10">256</text>
  <text x="535" y="288" text-anchor="middle" font-size="11.5" fill="#6b4f10">128</text>
  <text x="380" y="308" text-anchor="middle" font-size="12" fill="#6b4f10">codebook size at level <tspan font-style="italic">l</tspan> = 2048 / 2<tspan font-size="9" dy="-4">l&#8722;1</tspan></text>
  <text x="380" y="324" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a6a20">early levels are high-resolution; later levels encode low-entropy residuals</text>

  <line x1="350" y1="116" x2="350" y2="158" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- output SID -->
  <line x1="582" y1="245" x2="618" y2="245" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="622" y="222" width="120" height="46" rx="8" fill="#cfe3f7" stroke="#6aa3d5" stroke-width="1.3"/>
  <text x="682" y="242" text-anchor="middle" font-size="12" fill="#1c3a5e">Semantic ID</text>
  <text x="682" y="259" text-anchor="middle" font-size="13" font-weight="700" fill="#1c3a5e">A5 B25 … H55</text>

  <!-- losses -->
  <text x="60" y="366" font-size="13.5" font-weight="700" fill="#333">Three training signals</text>
  <rect x="30" y="378" width="220" height="66" rx="9" fill="#f4f4f4" stroke="#ccc" stroke-width="1"/>
  <text x="140" y="399" text-anchor="middle" font-size="12.5" font-weight="700" fill="#444">Reconstruction</text>
  <text x="140" y="418" text-anchor="middle" font-size="11.5" fill="#555">decode back to each</text>
  <text x="140" y="433" text-anchor="middle" font-size="11.5" fill="#555">input embedding</text>

  <rect x="268" y="378" width="220" height="66" rx="9" fill="#f4f4f4" stroke="#ccc" stroke-width="1"/>
  <text x="378" y="399" text-anchor="middle" font-size="12.5" font-weight="700" fill="#444">Quantization (RQ)</text>
  <text x="378" y="418" text-anchor="middle" font-size="11.5" fill="#555">codewords track residuals,</text>
  <text x="378" y="433" text-anchor="middle" font-size="11.5" fill="#555">with progressive masking</text>

  <rect x="506" y="378" width="224" height="66" rx="9" fill="#e9f4e9" stroke="#7fbf7f" stroke-width="1.2"/>
  <text x="618" y="399" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2a6b2a">Co-occurrence contrastive</text>
  <text x="618" y="418" text-anchor="middle" font-size="11.5" fill="#2a6b2a">videos watched together get</text>
  <text x="618" y="433" text-anchor="middle" font-size="11.5" fill="#2a6b2a">similar IDs — behavior signal</text>
</svg>
