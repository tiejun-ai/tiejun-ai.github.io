<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 504" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="504" fill="#ffffff"/>

  <!-- research query -->
  <rect x="210" y="16" width="160" height="32" rx="16" fill="#e6e6e6" stroke="#999" stroke-width="1.1"/>
  <text x="290" y="37" text-anchor="middle" font-size="13.5" fill="#333">Research Query</text>
  <line x1="290" y1="48" x2="290" y2="70" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- lead agent: plan -->
  <rect x="190" y="72" width="200" height="56" rx="9" fill="#fdf0c9" stroke="#e0b84c" stroke-width="1.3"/>
  <text x="290" y="96" text-anchor="middle" font-size="14" fill="#7a5a12" font-weight="700">Lead Agent</text>
  <text x="290" y="115" text-anchor="middle" font-size="12.5" fill="#7a5a12">(orchestrator)</text>
  <text x="404" y="95" font-size="12.5" fill="#555">plan(): decompose into</text>
  <text x="404" y="112" font-size="12.5" fill="#555">focused subtasks (JSON)</text>

  <!-- fan-out -->
  <line x1="290" y1="128" x2="290" y2="152" stroke="#555" stroke-width="1.4"/>
  <line x1="120" y1="152" x2="460" y2="152" stroke="#555" stroke-width="1.4"/>
  <line x1="120" y1="152" x2="120" y2="178" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="290" y1="152" x2="290" y2="178" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="460" y1="152" x2="460" y2="178" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="478" y="156" font-size="12.5" fill="#555">(parallel)</text>

  <!-- subagents -->
  <rect x="62" y="180" width="116" height="56" rx="9" fill="#cfe3f7" stroke="#6aa3d5" stroke-width="1.3"/>
  <text x="120" y="204" text-anchor="middle" font-size="13.5" fill="#1c3a5e" font-weight="700">Subagent 0</text>
  <text x="120" y="223" text-anchor="middle" font-size="12.5" fill="#1c3a5e">search loop</text>

  <rect x="232" y="180" width="116" height="56" rx="9" fill="#cfe3f7" stroke="#6aa3d5" stroke-width="1.3"/>
  <text x="290" y="204" text-anchor="middle" font-size="13.5" fill="#1c3a5e" font-weight="700">Subagent 1</text>
  <text x="290" y="223" text-anchor="middle" font-size="12.5" fill="#1c3a5e">search loop</text>

  <rect x="402" y="180" width="116" height="56" rx="9" fill="#cfe3f7" stroke="#6aa3d5" stroke-width="1.3"/>
  <text x="460" y="204" text-anchor="middle" font-size="13.5" fill="#1c3a5e" font-weight="700">Subagent 2</text>
  <text x="460" y="223" text-anchor="middle" font-size="12.5" fill="#1c3a5e">search loop</text>

  <text x="532" y="204" font-size="12.5" fill="#555">each runs its own</text>
  <text x="532" y="221" font-size="12.5" fill="#555">web_search loop</text>

  <!-- converge -->
  <line x1="120" y1="236" x2="120" y2="260" stroke="#555" stroke-width="1.4"/>
  <line x1="290" y1="236" x2="290" y2="260" stroke="#555" stroke-width="1.4"/>
  <line x1="460" y1="236" x2="460" y2="260" stroke="#555" stroke-width="1.4"/>
  <line x1="120" y1="260" x2="460" y2="260" stroke="#555" stroke-width="1.4"/>
  <line x1="290" y1="260" x2="290" y2="296" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="302" y="278" font-size="12.5" fill="#555">condensed findings</text>

  <!-- lead agent: synthesis -->
  <rect x="190" y="298" width="200" height="56" rx="9" fill="#fdf0c9" stroke="#e0b84c" stroke-width="1.3"/>
  <text x="290" y="322" text-anchor="middle" font-size="14" fill="#7a5a12" font-weight="700">Lead Agent</text>
  <text x="290" y="341" text-anchor="middle" font-size="12.5" fill="#7a5a12">synthesis</text>
  <text x="404" y="321" font-size="12.5" fill="#555">synthesize(): one</text>
  <text x="404" y="338" font-size="12.5" fill="#555">coherent markdown report</text>
  <line x1="290" y1="354" x2="290" y2="378" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- citation agent -->
  <rect x="190" y="380" width="200" height="44" rx="9" fill="#d6efd6" stroke="#5aa06a" stroke-width="1.3"/>
  <text x="290" y="407" text-anchor="middle" font-size="14" fill="#1f5130" font-weight="700">Citation Agent</text>
  <text x="404" y="406" font-size="12.5" fill="#555">map claims &#8594; source URLs</text>
  <line x1="290" y1="424" x2="290" y2="448" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- final report -->
  <rect x="205" y="450" width="170" height="38" rx="10" fill="#e9def5" stroke="#a583c9" stroke-width="1.3"/>
  <text x="290" y="474" text-anchor="middle" font-size="14" fill="#4a2f6b" font-weight="700">Final Report</text>
</svg>
